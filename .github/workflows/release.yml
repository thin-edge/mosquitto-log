# Release: builds and publishes both tools to a single GitHub release.
#
# Triggered by pushing a semver tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# GoReleaser is run twice against the same tag (order matters): the plugin
# config CREATES the release, then the CLI config APPENDS to it
# (release.mode: append). Both cross-compile with the shared build.zig via
# GoReleaser's experimental Zig builder, and produce tar.gz archives plus
# deb/rpm/apk packages.
name: Release

on:
  push:
    tags:
      - "v*"
  # Allow a manual dry run (snapshot, nothing published) from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write # needed to create the GitHub release and upload assets

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags

      - name: Read Zig version
        id: zig
        run: echo "version=$(sed -n 's/.*minimum_zig_version = "\([^"]*\)".*/\1/p' build.zig.zon)" >> "$GITHUB_OUTPUT"

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig.outputs.version }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      # On a tag push: real release. Otherwise (manual dispatch): snapshot only,
      # so nothing is published — a safe way to smoke-test the release pipeline.
      - name: Release plugin (creates the GitHub release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            goreleaser release -f plugin/.goreleaser.yaml --clean
          else
            goreleaser release -f plugin/.goreleaser.yaml --snapshot --clean --skip=publish,sign
          fi

      - name: Release CLI (appends to the same release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            goreleaser release -f cli/.goreleaser.yaml --clean
          else
            goreleaser release -f cli/.goreleaser.yaml --snapshot --clean --skip=publish,sign
          fi

      # On a manual dry run, keep the snapshot artifacts for inspection.
      - name: Upload snapshot artifacts (dry run only)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-dist
          path: |
            dist/plugin/*.tar.gz
            dist/plugin/*.deb
            dist/plugin/*.rpm
            dist/plugin/*.apk
            dist/cli/*.tar.gz
            dist/cli/*.deb
            dist/cli/*.rpm
            dist/cli/*.apk
          if-no-files-found: warn
